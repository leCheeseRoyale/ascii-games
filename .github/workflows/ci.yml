name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache Bun's global install cache keyed on the lockfile
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - run: bun run init:game blank

      - run: bun run check
      - run: bun run check:bounds
      - run: bun run test
      - run: bun run lint
      - run: bun run knip
      - run: bun run build
      - run: bun run export
